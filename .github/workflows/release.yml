name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mcp-hub-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mcp-hub-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mcp-hub-darwin-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mcp-hub-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/mcp-hub ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/mcp-hub.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/mcp-hub-linux-amd64/mcp-hub-linux-amd64
            artifacts/mcp-hub-darwin-arm64/mcp-hub-darwin-arm64
            artifacts/mcp-hub-darwin-amd64/mcp-hub-darwin-amd64
            artifacts/mcp-hub-windows-amd64.exe/mcp-hub-windows-amd64.exe
